<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智警引擎 · 研判结果</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="docs-shell ar-page" data-theme="light">
    <div class="site">
      <header class="site-header docs-header">
        <div class="page-wide docs-header__top">
          <div class="docs-brand" aria-label="智警引擎">
            <span class="docs-brand__mark"></span>
            <span class="docs-brand__text">智警引擎 POLICE</span>
          </div>
          <div class="docs-header__actions">
            <a class="docs-header__action" href="/">返回工作台</a>
          </div>
        </div>
      </header>

      <main class="page-wide site-main analysis-result-main">
        <div id="arLoading" class="ar-loading muted">加载中…</div>
        <div id="arError" class="ar-error" hidden></div>
        <div id="arRoot" class="ar-root" hidden>
          <div class="ar-head">
            <div>
              <span class="ar-case-id" id="arCaseId">—</span>
              <span id="arRiskBadge" class="ar-risk-badge">—</span>
            </div>
            <div class="ar-confidence-wrap">
              <div class="ar-confidence" id="arConfidence">置信度 —</div>
              <p class="ar-confidence-note muted" id="arConfidenceNote" hidden></p>
            </div>
          </div>
          <div class="ar-layout">
            <section class="ar-panel ar-panel--facts">
              <h2 class="ar-panel__title">警情事实</h2>
              <dl class="ar-dl">
                <dt>警情类型</dt>
                <dd id="arType">—</dd>
                <dt>地点</dt>
                <dd id="arLocation">—</dd>
                <dt>时间</dt>
                <dd id="arTime">—</dd>
                <dt>指派状态</dt>
                <dd id="arAssign">—</dd>
                <dt>警情描述</dt>
                <dd id="arDesc" class="ar-desc">—</dd>
              </dl>
              <div class="ar-workflow" id="arWorkflow" aria-label="流程进度"></div>
            </section>
            <section class="ar-panel ar-panel--ai">
              <h2 class="ar-panel__title">AI 研判</h2>
              <div class="ar-gauge-block">
                <div class="ar-gauge-ring" id="arGaugeRing" style="--ar-p: 0">
                  <div class="ar-gauge-inner">
                    <span class="ar-gauge-num" id="arGaugeNum">0</span>
                    <span class="ar-gauge-cap">风险评分</span>
                  </div>
                </div>
              </div>
              <div class="ar-factors" id="arFactors"></div>
              <div class="ar-suggest ar-suggest--primary" id="arPrimarySuggest"></div>
              <div class="ar-suggest ar-suggest--secondary muted" id="arSecondarySuggest"></div>
              <div class="ar-related" id="arRelated"></div>
              <div class="ar-feedback">
                <button type="button" class="btn-primary" id="arBtnAdopt">采纳</button>
                <button type="button" class="btn-ghost" id="arBtnIgnore">忽略</button>
                <span class="hint muted" id="arFeedbackState"></span>
              </div>
            </section>
          </div>
        </div>
      </main>
    </div>
    <script src="docs-theme.js"></script>
    <script src="plice-env.js"></script>
    <script src="utils.js"></script>
    <script src="ar-presentation-render.js"></script>
    <script src="analysis-result.js"></script>
  </body>
</html>
