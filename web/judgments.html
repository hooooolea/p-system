<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智警引擎 · 研判记录</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="docs-shell docs-shell--command-workbench command-page--standalone judgments-page ar-page" data-theme="light" data-page="judgments">
    <div class="site">
      <main class="site-main command-shell-main">
        <div class="command-app page-wide">

          <aside id="app-sidebar" class="command-app-sidebar" aria-label="主导航"></aside>

          <div class="doc-main command-app-body">
            <!-- Page Header -->
            <div class="jd-page-header">
              <div class="jd-page-header__left">
                <h1 class="jd-page-header__title">研判记录</h1>
                <span class="jd-page-header__sub">查看历史警情研判详情与处置记录</span>
              </div>
              <div class="jd-page-header__filter" id="jdFilter" role="group" aria-label="筛选条件">
                <button type="button" class="jd-filter-btn jd-filter-btn--active" data-filter="all">全部<span class="jd-filter-btn__count" id="filterCountAll"></span></button>
                <button type="button" class="jd-filter-btn" data-filter="high">高风险<span class="jd-filter-btn__count" id="filterCountHigh"></span></button>
                <button type="button" class="jd-filter-btn" data-filter="adopted">已采纳<span class="jd-filter-btn__count" id="filterCountAdopted"></span></button>
                <button type="button" class="jd-filter-btn" data-filter="pending">待复核<span class="jd-filter-btn__count" id="filterCountPending"></span></button>
              </div>
            </div>

            <!-- Split Layout -->
            <div class="jd-split">

              <!-- Left Rail -->
              <aside class="jd-rail" aria-label="研判条目">
                <div class="jd-rail__head">
                  <span class="jd-rail__head-title">记录列表</span>
                  <button type="button" class="jd-rail__refresh btn-ghost-sm" id="judgmentsRefreshBtn" aria-label="刷新列表">
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/>
                    </svg>
                    刷新
                  </button>
                </div>
                <span id="judgmentsMeta" class="jd-rail__meta" aria-live="polite"></span>
                <div id="judgmentsError" class="jd-error" hidden></div>
                <div id="judgmentsEmpty" class="jd-empty" hidden>
                  <svg width="48" height="48" viewBox="0 0 80 80" fill="none" class="jd-empty__icon">
                    <rect x="20" y="30" width="40" height="30" rx="4" fill="#e5e7eb"/>
                    <rect x="25" y="25" width="30" height="20" rx="2" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
                    <path d="M32 32h16M32 36h12" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="55" cy="25" r="8" fill="#dbeafe"/>
                    <path d="M52 25l2 2 4-4" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <p class="jd-empty__text">暂无研判记录</p>
                  <p class="jd-empty__sub">请在工作台执行「开始研判」</p>
                </div>
                <div id="judgmentStack" class="jd-rail__stack" aria-label="已研判警情列表"></div>
              </aside>

              <!-- Right Detail -->
              <section class="jd-detail" aria-label="研判详情">
                <!-- Placeholder -->
                <div id="jdDetailPlaceholder" class="jd-detail__placeholder">
                  <svg width="56" height="56" viewBox="0 0 80 80" fill="none" class="jd-detail__placeholder-icon">
                    <rect x="10" y="20" width="60" height="45" rx="6" fill="#eff6ff"/>
                    <rect x="18" y="15" width="44" height="30" rx="3" fill="#dbeafe" stroke="#bfdbfe" stroke-width="1.5"/>
                    <path d="M28 25h24M28 31h16" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                  <p class="jd-detail__placeholder-title">选择一条研判记录</p>
                  <p class="jd-detail__placeholder-sub">从左侧列表点击，查看警情事实与 AI 研判结果</p>
                </div>
                <div id="jdDetailLoading" class="jd-detail__loading" hidden>
                  <div class="jd-spinner"></div>
                  <span>加载中…</span>
                </div>
                <div id="jdDetailError" class="jd-error" hidden></div>

                <!-- Detail Content -->
                <div id="jdDetailContent" class="jd-detail__content" hidden>
                  <!-- Header Summary Card -->
                  <div class="jd-detail-card jd-detail-card--header" id="jdDetailHeader">
                    <div class="jd-detail-card__top">
                      <span class="jd-detail-card__case-id" id="jdArCaseId">—</span>
                      <span id="jdArRiskBadge" class="jd-risk-badge">—</span>
                    </div>
                    <div class="jd-detail-card__meta">
                      <span class="jd-detail-card__meta-item">
                        <span class="muted">类型</span>
                        <strong id="jdArType">—</strong>
                      </span>
                      <span class="jd-detail-card__meta-item">
                        <span class="muted">地点</span>
                        <strong id="jdArLocation">—</strong>
                      </span>
                      <span class="jd-detail-card__meta-item">
                        <span class="muted">时间</span>
                        <strong id="jdArTime">—</strong>
                      </span>
                      <span class="jd-detail-card__meta-item">
                        <span class="muted">置信度</span>
                        <strong id="jdArConfidence">—%</strong>
                      </span>
                    </div>
                  </div>

                  <!-- Facts + AI Analysis Two-Column -->
                  <div class="jd-detail-grid">
                    <!-- Facts Panel -->
                    <div class="jd-panel">
                      <div class="jd-panel__icon">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                        </svg>
                      </div>
                      <h2 class="jd-panel__title">警情事实</h2>
                      <dl class="jd-dl">
                        <dt>指派状态</dt><dd id="jdArAssign">—</dd>
                        <dt>警情描述</dt><dd id="jdArDesc">—</dd>
                      </dl>
                      <div class="jd-workflow" id="jdArWorkflow" aria-label="流程进度"></div>
                    </div>

                    <!-- AI Analysis Panel -->
                    <div class="jd-panel jd-panel--ai">
                      <div class="jd-panel__icon">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23.693L5 14.5m14.8.8l1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0112 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5"/>
                        </svg>
                      </div>
                      <h2 class="jd-panel__title">AI 研判</h2>

                      <!-- Gauge Ring -->
                      <div class="jd-gauge-block">
                        <div id="jdArGaugeRing" class="jd-gauge-ring">
                          <div class="jd-gauge-inner">
                            <span class="jd-gauge-num" id="jdArGaugeNum">0</span>
                            <span class="jd-gauge-cap">风险评分</span>
                          </div>
                        </div>
                      </div>

                      <!-- Factors -->
                      <div class="jd-factors" id="jdArFactors"></div>

                      <!-- Suggestions -->
                      <div class="ar-suggest ar-suggest--primary" id="jdArPrimarySuggest"></div>
                      <div class="ar-suggest ar-suggest--secondary muted" id="jdArSecondarySuggest"></div>

                      <!-- Related -->
                      <div class="ar-related" id="jdArRelated"></div>
                    </div>
                  </div>

                  <!-- Action Buttons -->
                  <div class="jd-actions">
                    <button type="button" class="btn-primary" id="jdArBtnAdopt">采纳建议</button>
                    <button type="button" class="btn-ghost-sm" id="jdArBtnIgnore">忽略</button>
                    <span class="hint muted" id="jdArFeedbackState"></span>
                  </div>
                </div>
              </section>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="docs-theme.js"></script>
    <script src="plice-env.js"></script>
    <script src="api.js"></script>
    <script src="utils.js"></script>
    <script src="sidebar.js"></script>
    <script src="ar-presentation-render.js"></script>
    <script src="judgments.js"></script>
  </body>
</html>
