<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智警引擎 · 警情研判</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #f5f7fa;
        color: #374151;
        margin: 0;
        height: 100vh;
        overflow: hidden;
      }
      *, *::before, *::after { box-sizing: border-box; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
  </head>
  <body>

    <div class="flex h-full">

      <!-- Sidebar -->
      <aside class="ref-sidebar">
        <!-- Logo -->
        <div class="ref-sidebar__logo">
          <div class="ref-sidebar__logo-mark">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
            </svg>
          </div>
          <div>
            <div class="ref-sidebar__logo-name">智警引擎</div>
            <div class="ref-sidebar__logo-ver">智慧警务</div>
          </div>
        </div>

        <!-- Nav -->
        <nav class="ref-sidebar__nav">
          <a href="command-situation.html" class="sidebar-item">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            指挥态势
          </a>
          <a href="command-map.html" class="sidebar-item">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
            </svg>
            地图中心
          </a>
          <a href="workbench.html" class="sidebar-item active">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
            </svg>
            接警研判
          </a>
          <a href="judgments.html" class="sidebar-item">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
            </svg>
            研判记录
          </a>
        </nav>

        <!-- Status Footer -->
        <div class="ref-sidebar__footer">
          <div class="ref-sidebar__status-box">
            <div class="ref-sidebar__status-row">
              <span class="ref-sidebar__status-dot"></span>
              <span>系统正常</span>
            </div>
            <div class="ref-sidebar__status-row">
              <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
              </svg>
              <span>RAG</span>
            </div>
            <div id="sidebarClock" class="ref-sidebar__clock"></div>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="ref-main">

        <!-- Page Header -->
        <div class="ref-page-header">
          <h1 class="ref-page-header__title">接警研判</h1>
          <span class="ref-page-header__sub">智能辅助研判，提升接警效率与准确性</span>
        </div>

        <!-- Card 1: 报警内容 -->
        <div class="ref-card">
          <div class="ref-card__head">
            <div class="ref-card__head-icon">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
              </svg>
            </div>
            <h2 class="ref-card__title">报警内容</h2>
          </div>

          <!-- 标签行 -->
          <div class="ref-tag-row">
            <label class="ref-tag-row__label">报警原文</label>
            <div class="ref-tags">
              <button type="button" class="tag-btn active" onclick="toggleTag(this)">打架斗殴</button>
              <button type="button" class="tag-btn" onclick="toggleTag(this)">交通事故</button>
              <button type="button" class="tag-btn" onclick="toggleTag(this)">电信诈骗</button>
              <button type="button" class="tag-btn" onclick="toggleTag(this)">火灾险情</button>
              <button type="button" class="tag-btn" onclick="toggleTag(this)">紧急医疗</button>
              <button type="button" class="tag-btn" onclick="toggleTag(this)">
                更多
                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- 文本区 -->
          <div class="ref-textarea-wrap">
            <textarea
              id="alarmText"
              class="ref-textarea"
              rows="5"
              placeholder="粘贴或输入完整报警原文&#10;包含事发地点、当事人特征、具体诉求、现场状况…"
            ></textarea>
          </div>

          <!-- 底部操作行 -->
          <div class="ref-card__footer">
            <button type="button" id="moreExamplesBtn" class="ref-btn-outline" onclick="document.getElementById('exampleDrawer')?.classList.toggle('drawer-open')">
              更多类型（20+真实案例）
              <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
              </svg>
            </button>
            <button id="analyzeBtn" type="button" class="analyze-btn">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"/>
              </svg>
              开始研判
            </button>
          </div>
        </div>

        <!-- Card 2: 辅助信息 -->
        <div class="ref-card">
          <div class="ref-card__head">
            <div class="ref-card__head-icon">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/>
              </svg>
            </div>
            <h2 class="ref-card__title">辅助信息</h2>
          </div>

          <div class="ref-aux-layout">
            <!-- Left: Inputs -->
            <div class="ref-aux-left">
              <div class="ref-file-tabs">
                <button type="button" class="file-tab active" onclick="switchFileTab(this, 'audio')">
                  <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
                  </svg>
                  音频文件
                </button>
                <button type="button" class="file-tab" onclick="switchFileTab(this, 'video')">
                  <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z"/>
                  </svg>
                  视频文件
                </button>
              </div>

              <div class="ref-field">
                <label for="ingestAlarmNoInput" class="ref-field__label">警情编号（可选）</label>
                <input id="ingestAlarmNoInput" type="text" class="ref-field__input" placeholder="可选，回车自动合并" />
              </div>

              <div class="ref-field">
                <label for="ingestAlarmTextInput" class="ref-field__label">接警备注（可选）</label>
                <textarea id="ingestAlarmTextInput" class="ref-field__textarea" rows="3" placeholder="与语音一并写入，辅助AI理解"></textarea>
              </div>
            </div>

            <!-- Right: History -->
            <div class="ref-history">
              <div class="ref-history__head">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                历史记录
              </div>
              <div id="historyList" class="ref-history__body">
                <div class="ref-history__empty">
                  <svg width="64" height="64" viewBox="0 0 80 80" fill="none">
                    <rect x="20" y="30" width="40" height="30" rx="4" fill="#e5e7eb"/>
                    <rect x="25" y="25" width="30" height="20" rx="2" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
                    <path d="M32 32h16M32 36h12" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="55" cy="25" r="8" fill="#dbeafe"/>
                    <path d="M52 25l2 2 4-4" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <p>您的历史研判记录将显示在这里</p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Tips Card -->
        <div class="ref-tips-card">
          <div class="ref-tips-card__icon">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 18v-5.25m0 0a6.01 6.01 0 001.5-.189m-1.5.189a6.01 6.01 0 01-1.5-.189m3.75 7.478a12.06 12.06 0 01-4.5 0m3.75 2.383a14.406 14.406 0 01-3 0M14.25 18v-.192c0-.983.658-1.823 1.508-2.316a7.5 7.5 0 10-7.517 0c.85.493 1.509 1.333 1.509 2.316V18"/>
            </svg>
          </div>
          <div class="ref-tips-card__body">
            <h3 class="ref-tips-card__title">使用提示</h3>
            <ul class="ref-tips-card__list">
              <li>请尽量提供完整的报警内容，包含时间、地点、人物、事件经过等关键信息</li>
              <li>支持语音、视频文件上传，系统将自动提取关键信息进行辅助研判</li>
            </ul>
          </div>
        </div>

        <!-- 研判结果（动态显示） -->
        <section id="workbenchResultsPanel" aria-label="研判结果" hidden>

          <!-- 第一层：AI分析结果焦点卡 -->
          <div id="analyzeCard" class="rs-card rs-card--focus" hidden>
            <div class="rs-card__head">
              <div class="rs-card__head-icon">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23-.693L5 14.5m14.8.8l1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0112 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5"/>
                </svg>
              </div>
              <div>
                <div class="rs-card__title">AI 研判分析</div>
                <div id="cardAnalysisId" class="rs-card__sub"></div>
              </div>
            </div>
            <div class="rs-card__body">
              <div class="rs-focus-row">
                <div class="rs-conf-ring">
                  <div class="rs-conf-ring__top">
                    <span class="rs-conf-ring__lbl">置信度</span>
                    <span id="cardConfPct" class="conf-bar__pct"></span>
                  </div>
                  <div class="conf-bar">
                    <div id="cardConfFill" class="conf-bar__fill"></div>
                  </div>
                </div>
                <div id="cardKeyInfo" class="rs-conf-ring__keyinfo"></div>
              </div>
              <div id="cardConfRation" class="rs-card__ration"></div>
              <div id="cardSteps" class="rs-card__steps"></div>
            </div>
          </div>

          <!-- 第二层：概要横条 -->
          <div class="rs-meta-strip">
            <div class="rs-meta-chip">
              <div class="rs-meta-chip__icon">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
              </div>
              <div>
                <span class="rs-meta-chip__lbl">警情类型</span>
                <span class="rs-meta-chip__val" id="resultIncidentType">—</span>
              </div>
            </div>
            <div class="rs-meta-chip">
              <div class="rs-meta-chip__icon">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
              </div>
              <div>
                <span class="rs-meta-chip__lbl">风险等级</span>
                <span class="risk-tag" id="resultRiskLevel">—</span>
              </div>
            </div>
            <div class="rs-meta-chip">
              <div class="rs-meta-chip__icon">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              </div>
              <div>
                <span class="rs-meta-chip__lbl">处理耗时</span>
                <span class="rs-meta-chip__val" id="resultDuration">—</span>
              </div>
            </div>
          </div>

          <!-- 第三层：警情摘要 + 处置建议 -->
          <div class="rs-detail-cards">
            <div class="rs-detail-card">
              <div class="rs-detail-card__head">
                <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                警情摘要
              </div>
              <div id="summaryBox" class="rs-detail-card__body">暂无研判结果。</div>
            </div>
            <div class="rs-detail-card">
              <div class="rs-detail-card__head">
                <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
                处置建议
              </div>
              <div id="suggestionBox" class="rs-detail-card__body">暂无。</div>
            </div>
          </div>

          <!-- 第四层：关键信息列表 -->
          <div id="keyInfoBox" class="rs-info-list"></div>

          <!-- 第四层：人工复核 + 法律依据 -->
          <div class="rs-review-block">
            <div class="rs-review-radios" role="radiogroup" aria-label="复核结论">
              <label class="rs-radio-pill"><input type="radio" name="reviewChoice" value="同意系统结果" checked /><span>同意系统结果</span></label>
              <label class="rs-radio-pill"><input type="radio" name="reviewChoice" value="驳回系统结果" /><span>驳回系统结果</span></label>
              <label class="rs-radio-pill"><input type="radio" name="reviewChoice" value="需补充信息后再判定" /><span>需补充信息后再判定</span></label>
            </div>
            <div class="rs-review-form">
              <div class="rs-field">
                <label for="reviewNote">复核备注（可选）</label>
                <input id="reviewNote" type="text" placeholder="例如：地点待核实" />
              </div>
              <div class="rs-btn-row">
                <button id="saveReviewBtn" type="button" class="rs-btn-ghost">保存复核结论</button>
                <button id="downloadMdBtn" type="button" class="rs-btn-primary">下载研判与布控</button>
              </div>
            </div>
            <p id="reviewHint" class="wb-hint"></p>
          </div>

          <details class="rs-details-panel">
            <summary>法律依据</summary>
            <div id="lawBox" class="box details-body"></div>
          </details>

        </section>

      </main>
    </div>

    <script src="plice-env.js"></script>
    <script src="api.js"></script>
    <script src="utils.js"></script>
    <script src="sidebar.js"></script>
    <script src="perf-render.js"></script>
    <script src="app.js"></script>
    <script>
      /* 参考样式专用的 JS 函数（与 app.js 中的 toggleTag/switchFileTab 并存） */

      function toggleTag(btn) {
        document.querySelectorAll('.tag-btn').forEach(function(b) {
          b.classList.remove('active', 'bg-blue-600', 'text-white', 'border-blue-600');
          b.classList.add('bg-white', 'text-gray-600', 'border-gray-200');
        });
        btn.classList.remove('bg-white', 'text-gray-600', 'border-gray-200');
        btn.classList.add('active', 'bg-blue-600', 'text-white', 'border-blue-600');
      }

      function switchFileTab(btn, type) {
        document.querySelectorAll('.file-tab').forEach(function(b) {
          b.classList.remove('active', 'bg-blue-50', 'text-blue-600', 'border-blue-200');
          b.classList.add('bg-white', 'text-gray-600', 'border-gray-200');
        });
        btn.classList.remove('bg-white', 'text-gray-600', 'border-gray-200');
        btn.classList.add('active', 'bg-blue-50', 'text-blue-600', 'border-blue-200');
      }

      /* 时钟更新 */
      function updateSidebarClock() {
        var el = document.getElementById('sidebarClock');
        if (!el) return;
        var now = new Date();
        var mm = String(now.getMonth() + 1).padStart(2, '0');
        var dd = String(now.getDate()).padStart(2, '0');
        var hh = String(now.getHours()).padStart(2, '0');
        var min = String(now.getMinutes()).padStart(2, '0');
        var ss = String(now.getSeconds()).padStart(2, '0');
        el.textContent = mm + '/' + dd + ' ' + hh + ':' + min + ':' + ss;
      }
      updateSidebarClock();
      setInterval(updateSidebarClock, 1000);
    </script>
  </body>
</html>
