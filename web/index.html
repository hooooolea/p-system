<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智警引擎 · 智慧警务</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="entry-page" data-theme="dark">
    <div class="entry-shell">

      <!-- 左侧品牌区 -->
      <aside class="entry-brand">
        <div class="entry-brand__inner">
          <div class="entry-brand__mark"></div>
          <h1 class="entry-brand__name">智警引擎</h1>
          <p class="entry-brand__slogan">基于多源感知的智慧警务决策平台</p>
          <ul class="entry-brand__features">
            <li>多源视频感知</li>
            <li>智能警情研判</li>
            <li>实时指挥态势</li>
            <li>空间落点分析</li>
          </ul>
        </div>
      </aside>

      <!-- 右侧登录区 -->
      <main class="entry-main">
        <div class="entry-card">
          <div class="entry-card__header">
            <h2 class="entry-card__title">进入工作台</h2>
            <p class="entry-card__sub">请填写您的警号以继续</p>
          </div>

          <form class="entry-form" id="entryForm" novalidate>
            <div class="entry-field">
              <label for="badgeNumber" class="entry-field__label">警号</label>
              <input
                id="badgeNumber"
                type="text"
                class="entry-field__input"
                placeholder="请输入警号"
                autocomplete="username"
                maxlength="20"
                spellcheck="false"
              />
              <span id="badgeHint" class="entry-field__hint"></span>
            </div>

            <button type="submit" class="btn-primary entry-submit">
              进入工作台
            </button>
          </form>

          <p class="entry-card__footer">
            智警引擎 &copy; 2026 &nbsp;|&nbsp; 青创未来赛道
          </p>
        </div>
      </main>

    </div>

    <script>
      // 警号本地缓存
      (function () {
        var saved = localStorage.getItem('plice_badge');
        if (saved) document.getElementById('badgeNumber').value = saved;
      })();

      document.getElementById('entryForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var input = document.getElementById('badgeNumber');
        var hint = document.getElementById('badgeHint');
        var val = input.value.trim();

        if (!val) {
          hint.textContent = '请输入警号';
          hint.className = 'entry-field__hint entry-field__hint--error';
          input.focus();
          return;
        }
        if (val.length < 4) {
          hint.textContent = '警号长度不能少于4位';
          hint.className = 'entry-field__hint entry-field__hint--error';
          input.focus();
          return;
        }

        hint.textContent = '';
        hint.className = 'entry-field__hint';
        localStorage.setItem('plice_badge', val);

        // 跳转到工作台
        location.href = '/workbench.html';
      });
    </script>
  </body>
</html>
